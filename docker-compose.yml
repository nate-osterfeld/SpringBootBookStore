services:
  bookstore-api:
    build: ./api
    ports:
      - "5000:5000"
    env_file:
      - ./api/.env
    environment:
      - PORT=5000
  
  bookstore-ui:
    build: ./ui
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - API_BASE_URL=http://bookstore-api:5000
    depends_on:
      - bookstore-api