<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Layout page</title>
    <link rel="stylesheet" th:href="@{/public-layout.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
    <body>
        <div class="banner">
            <h1 class="title"><a href="/">Book Store</a></h1>

            <nav>
                <a href="/"><span>Home</span></a>
                <a href="/purchases"><span>My Books</span></a>
                <a href="#"><span>Authors</span></a>
                <a href="/admin/books"><span>Dashboard</span></a>
            </nav>
            <a href="/login" class="user" id="loginLink">Sign in</a>
            <a href="/cart" id="cartLink">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="badge">0</span>
            </a>
            <a href="/account" id="accountLink" style="display: none;">My account</a>
        </div>
        <!-- start fragment here -->
        <div class="put-fragment-here" layout:fragment="content">
        </div>
    </body>

<script>
    document.addEventListener("DOMContentLoaded", async function() {
        // Use localStorage to determine login status
        const token = localStorage.getItem("jwt");
        const loginLink = document.getElementById("loginLink");
        const cartLink = document.getElementById("cartLink");
        const accountLink = document.getElementById("accountLink");

        if (token) {
            loginLink.style.display = "none";
            cartLink.style.display = "block";
            accountLink.style.display = "block";
        } else {
            loginLink.style.display = "block";
            cartLink.style.display = "none";
            accountLink.style.display = "none";
        }

        // Display cart count
        const cartBadge = document.getElementById("cart-count");

        try {
            const response = await fetch("http://localhost:5000/api/cart/count", {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                },
                credentials: "include"
            });

            if (response.ok) {
                const count = await response.json();
                cartBadge.innerText = count;
            } else {
                cartBadge.style.display = "none";
            }
        } catch (error) {
            console.error("Error fetching cart count:", error);
            cartBadge.style.display = "none";
        }
    });
</script>
</html>
