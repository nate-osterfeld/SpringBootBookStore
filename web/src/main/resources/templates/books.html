<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/public-layout.html}">
    <head>
        <title>Books</title>
        <link rel="stylesheet" th:href="@{/books.css}">
    </head>
    <body>
        <!-- start fragment here -->
        <div layout:fragment="content">
            <h1 class="page-title">Books</h1>

            <div class="search-section">
                <input type="text"
                       id="bookSearch"
                       placeholder="Search by title, author, or genre..."
                >
            </div>

            <div class="book-grid">
                <div class="book-card" th:each="book : ${books}">

                    <a th:href="@{'/books/' + ${book.id}}">
                        <img class="book-cover"
                             th:src="${book.coverImageUrl.startsWith('/uploads/books')
                                 ? 'http://localhost:5000' + book.coverImageUrl
                                 : book.coverImageUrl}"
                             th:alt="${book.title}"/>
                    </a>

                    <div class="book-info">
                        <h3 class="book-title">
                            <a th:href="@{'/books/' + ${book.id}}" th:text="${book.title}">Title</a>
                        </h3>
                        <a class="book-author" th:href="@{'/authors/' + ${book.authorId}}" th:text="${book.authorName}">Author</a>
                        <p class="book-genre" th:text="${book.genre}">Genre</p>
                    </div>

                    <div class="book-actions">
                        <span class="book-price" th:text="'$' + ${#numbers.formatDecimal(book.price, 1, 2)}">$0.00</span>
                        <span class="stock-badge in-stock"
                              th:if="${book.quantity > 0}"
                              th:text="'(' + ${book.quantity} + ')' + ' In Stock'">
                        </span>

                        <span class="stock-badge out-of-stock" th:if="${book.quantity <= 0}">Out of Stock</span>
                    </div>

                    <div class="book-buttons">
                        <a th:href="@{'/books/' + ${book.id}}" class="btn btn-details">Details</a>
                        <button class="btn btn-cart" th:data-id="${book.id}" th:disabled="${book.quantity <= 0}">Add to Cart</button>
                    </div>
                </div>
            </div>

            <div class="empty-state" th:if="${#lists.isEmpty(books)}">
                <p>No books available yet. Check back soon!</p>
            </div>
        </div>
    </body>
</html>

<script>
    // Handle add-to-cart
    document.querySelectorAll('.btn-cart').forEach(button => {
        button.addEventListener('click', async (e) => {
            const bookId = button.getAttribute('data-id');

            const response = await fetch("http://localhost:5000/api/cart", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ bookId: bookId, quantity: 1, mode: "add" })
            });

            if (response.ok) {
                // Get new cart sum from response body
                const newTotalCount = await response.json();

                const cartBadge = document.getElementById("cart-count");
                if (cartBadge) {
                    cartBadge.innerText = newTotalCount;

                    cartBadge.classList.add('pulse-animation');
                    setTimeout(() => cartBadge.classList.remove('pulse-animation'), 300);
                }
            } else {
                if (localStorage.getItem("jwt")) {
                    alert("Your cart already holds the max in stock for this item");
                } else {
                    alert("Must be logged in to complete this action!")
                }
            }
        });
    });

    // Handle Search
    document.addEventListener("DOMContentLoaded", () => {
        const searchInput = document.getElementById("bookSearch");

        // Select all the cards
        const bookCards = document.querySelectorAll(".book-card");

        searchInput.addEventListener("input", (e) => {
            const searchTerm = e.target.value.toLowerCase();

            bookCards.forEach(card => {
                // Pull text from the specific elements inside the card
                const title = card.querySelector(".book-title").textContent.toLowerCase();
                const author = card.querySelector(".book-author").textContent.toLowerCase();
                const genre = card.querySelector(".book-genre").textContent.toLowerCase();

                // If any of them match the search term, show the card
                if (title.includes(searchTerm) || author.includes(searchTerm) || genre.includes(searchTerm)) {
                    card.style.display = "";
                } else {
                    card.style.display = "none";
                }
            });
        });
    });
</script>
