<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/public-layout.html}">
<head>
    <title>Cart</title>
    <link rel="stylesheet" th:href="@{/cart.css}">
</head>

<body>
<div layout:fragment="content">
    <h1 class="page-title">Cart</h1>

    <div class="cart-container">
        <div th:each="item : ${cartItems}"
             class="cart-item"
             th:data-cart-item-id="${item.getId()}"
             th:data-book-id="${item.getBook().getId()}"
             th:data-price="${item.getBook().getPrice()}">

            <img class="book-img"
                 th:src="${item.getBook().coverImageUrl.startsWith('/uploads/books')
                     ? 'http://localhost:5000' + item.getBook().getCoverImageUrl()
                     : item.getBook().getCoverImageUrl()}"
                 th:alt="${item.getBook().getTitle()}"/>

            <div class="item-details">
                <h3 th:text="${item.getBook().getTitle()}"></h3>

                <div class="price"
                     th:text="${#numbers.formatCurrency(item.getBook().getPrice())}">
                </div>

                <div class="actions">
                    <button class="btn remove">Remove</button>

                    <div class="quantity">
                        <button type="button" class="minus">-</button>
                        <input type="text"
                               class="qty-input"
                               th:value="${item.getQuantity()}" />
                        <button type="button" class="plus">+</button>
                    </div>

                    <div class="cart-item-total"></div>
                </div>
            </div>
        </div>

        <div class="subtotal">
            Total:
            <strong id="subtotal"
                    th:text="${#numbers.formatCurrency(subtotal)}">
            </strong>
        </div>

        <div class="cart-footer">
            <button class="btn continue">Continue Shopping</button>
            <button class="btn checkout"
                    th:disabled="${#lists.isEmpty(cartItems)}"
                    th:classappend="${#lists.isEmpty(cartItems)} ? 'btn-disabled' : ''">
                Checkout
            </button>
        </div>
    </div>
</div>
</body>
</html>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        // Update cart totals
        function updateCartTotals() {
            let subtotal = 0;
            let totalItems = 0;

            document.querySelectorAll(".cart-item").forEach(item => {
                const price = parseFloat(item.dataset.price) || 0;
                const qtyInput = item.querySelector(".qty-input");
                const quantity = parseInt(qtyInput.value) || 0;

                subtotal += (price * quantity);
                totalItems += quantity;

                // Update individual item total
                const itemTotalDisplay = item.querySelector(".cart-item-total");
                if (itemTotalDisplay) {
                    itemTotalDisplay.textContent = "$" + (price * quantity).toFixed(2);
                }
            });

            // Update subtotal display
            const subtotalEl = document.getElementById("subtotal");
            if (subtotalEl) subtotalEl.textContent = "$" + subtotal.toFixed(2);

            // Update global cart badge (total of ALL items)
            const cartBadge = document.getElementById("cart-count");
            if (cartBadge) cartBadge.textContent = totalItems.toString();
        }

        // Handle quantity buttons
        document.querySelectorAll(".cart-item").forEach(item => {
            const input = item.querySelector(".qty-input");
            const plus = item.querySelector(".plus");
            const minus = item.querySelector(".minus");

            plus.addEventListener("click", () => {
                let val = parseInt(input.value) || 0;
                input.value = (val + 1).toString();
                updateCartTotals();
            });

            minus.addEventListener("click", () => {
                let val = parseInt(input.value) || 0;
                if (val > 1) {
                    input.value = (val - 1).toString();
                    updateCartTotals();
                }
            });

            // Handle manual input on change
            input.addEventListener("change", () => {
                if (parseInt(input.value) < 1 || isNaN(parseInt(input.value))) {
                    input.value = "1";
                }
                updateCartTotals();
            });
        });

        // Initial run on page load
        updateCartTotals();
    });

    // Handle remove
    document.querySelectorAll(".cart-item").forEach(item => {
        const remove = item.querySelector(".remove");

        remove.addEventListener("click", async () => {
            console.log(item.dataset.cartItemId)
            const response = await fetch(`/cart/delete/${item.dataset.cartItemId}`, {
                method: 'DELETE',
            })

            if (response.ok) {
                window.location.reload();
            }
        })
    });

    // Handle checkout
    document.querySelector(".checkout").addEventListener("click", async () => { // Added 'async' here
        const items = Array.from(document.querySelectorAll(".cart-item")).map(item => ({
            bookId: item.dataset.bookId,
            quantity: item.querySelector(".qty-input").value
        }));

        try {
            const response = await fetch('/cart/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(items)
            });

            if (response.ok) {
                alert("Order placed successfully!");
                window.location.href = "/purchases";
            } else {
                // Display message field from MVC GlobalExceptionHandler JSON (check if object or string)
                const errorData = await response.json();
                let display = errorData.message;

                const obj = JSON.parse(display);
                if (obj.message)
                    display = obj.message;

                alert(display);
            }
        } catch (err) {
            alert("A network error occurred. Please try again.");
        }
    });
</script>
