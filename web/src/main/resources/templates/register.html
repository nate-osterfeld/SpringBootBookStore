<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/public-layout.html}">
<head>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/register.css}">
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <div class="register-card">
            <h2>Create account</h2>

            <form id="registerForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" name="username" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Min. 6 characters" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirmPassword" placeholder="Repeat password" required>
                </div>

                <div class="form-group">
                    <label>Select Role</label>
                    <select name="role" class="form-control" style="width: 100%; padding: 8px; margin-bottom: 15px;">
                        <option value="USER">User</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>

                <button type="submit" class="register-btn">Register</button>
            </form>

            <p class="register-link">
                Already have an account?
                <a href="/login">Sign in here</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>

<script>
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const username = this.username.value;
        const password = this.password.value;
        const confirmPassword = this.confirmPassword.value;
        const role = this.role.value;

        if (password.length < 6) {
            alert("Password must be at least 6 characters long.");
            return;
        }

        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }

        const response = await fetch("http://localhost:5000/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password,
                role: role
            })
        });

        if (response.ok) {
            alert("Account created! Please log in.");
            window.location.href = "/login";
        } else {
            alert("An account with this email already exists.");
        }
    });
</script>
