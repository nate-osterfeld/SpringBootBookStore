<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-layout.html}">
<head>
    <title>Add Authors</title>
    <link rel="stylesheet" th:href="@{/admin/authors/add-author.css}">
</head>
<body>
<!-- start fragment here -->
<div class="put-fragment-here" style="width: 100%;" layout:fragment="content">
    <div class="banner">Bookstore Management</div>
    <div class="breadcrumbs">
        Dashboard > <a href="/admin/authors">Manage Authors</a> > <a href="/admin/authors/add-author">Add Author</a>
    </div>
    <div class="manage-container">
        <div class="manage-heading">
            <div class="manage-title">Add New Author</div>
        </div>

        <!-- form -->
        <div class="form-container">
            <form
                th:action="@{/admin/authors/add-author}"
                method="post"
                enctype="multipart/form-data"
                th:object="${author}"
            >
                <div class="form-group">
                    <label for="name">Name</label>
                    <input
                        type="text"
                        id="name"
                        th:field="*{name}"
                        placeholder="Author name"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea
                            id="bio"
                            th:field="*{bio}"
                            rows="5"
                            placeholder="Author biography"
                    ></textarea>
                </div>
                <div class="form-group">
                    <label for="authorImage">Author Image</label>
                    <input type="file" id="authorImage" name="authorImage" accept="image/*" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-save">
                        Save Author
                    </button>
                    <a th:href="@{/admin/authors}" class="btn-cancel">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
