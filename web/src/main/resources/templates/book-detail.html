<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/public-layout.html}">
<head>
    <title th:text="${book.title}">Book Title</title>
    <link rel="stylesheet" th:href="@{/book-detail.css}"/>
</head>
<body>
<div layout:fragment="content">
    <div class="book-detail">
        <img th:if="${book.coverImageUrl != null}"
             th:src="${book.coverImageUrl.startsWith('/uploads/books')
                     ? 'http://localhost:5000' + book.coverImageUrl
                     : book.coverImageUrl}"
             alt="Book cover"/>

        <div class="book-info">
            <h1 th:text="${book.title}">Title</h1>
            <p class="author">
                by <a th:href="@{'/authors/' + ${book.authorId}}"
                      th:text="${book.authorName}">Author Name</a>
            </p>
            <p class="genre" th:text="${book.genre}">Genre</p>
            <p class="description" th:text="${book.description}">
                Description text
            </p>

            <div class="pricing">
                        <span class="price"
                              th:text="'$' + ${book.price}">$0.00</span>
            </div>

            <p class="stock"
               th:if="${book.quantity != null and book.quantity > 0}"
               th:text="${book.quantity} + ' in stock'">In stock</p>
            <p class="out-of-stock"
               th:if="${book.quantity == null or book.quantity == 0}">
                Out of stock
            </p>

            <button class="btn btn-cart" th:data-id="${book.id}" th:disabled="${book.quantity <= 0}">Add to Cart</button>

            <a th:href="@{/}" class="back-link">Back to all books</a>
        </div>
    </div>
</div>
</body>
</html>

<script>
    document.querySelectorAll('.btn-cart').forEach(button => {
        button.addEventListener('click', async (e) => {
            const bookId = button.getAttribute('data-id');

            const response = await fetch("http://localhost:5000/api/cart", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ bookId: bookId, quantity: 1, mode: "add" })
            });

            if (response.ok) {
                // Get new cart sum from response body
                const newTotalCount = await response.json();

                const cartBadge = document.getElementById("cart-count");
                if (cartBadge) {
                    cartBadge.innerText = newTotalCount;

                    cartBadge.classList.add('pulse-animation');
                    setTimeout(() => cartBadge.classList.remove('pulse-animation'), 300);
                }
            } else {
                if (localStorage.getItem("jwt")) {
                    alert("Your cart already holds the max in stock for this item");
                } else {
                    alert("Must be logged in to complete this action!")
                }
            }
        });
    });
</script>
